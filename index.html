<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olha a Mão 🖐️</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131d;
      --card:      #1c1c2e;
      --accent:    #7c3aed;
      --accent2:   #a855f7;
      --glow:      rgba(124, 58, 237, 0.35);
      --text:      #f0eeff;
      --muted:     #8b8aaa;
      --bar-bg:    #2a2a40;
      --radius:    18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── BACKGROUND GLOW ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,58,237,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(168,85,247,.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 860px;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      margin-bottom: 2.75rem;
    }

    .site-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      letter-spacing: -1px;
      background: linear-gradient(135deg, #c4b5fd 0%, #a855f7 40%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .site-subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-top: .5rem;
      letter-spacing: .02em;
    }

    .hand-emoji {
      display: inline-block;
      animation: wave 2.4s ease-in-out infinite;
      transform-origin: 70% 80%;
      font-style: normal;
    }

    @keyframes wave {
      0%,100% { transform: rotate(0deg); }
      20%      { transform: rotate(18deg); }
      40%      { transform: rotate(-6deg); }
      60%      { transform: rotate(14deg); }
      80%      { transform: rotate(-4deg); }
    }

    /* ── MAIN CARD ── */
    .main-card {
      background: var(--card);
      border: 1px solid rgba(124,58,237,.22);
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
      overflow: hidden;
    }

    /* ── WEBCAM PANEL ── */
    .webcam-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    #webcam-container {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 3px rgba(124,58,237,.35), 0 0 30px var(--glow);
    }

    #webcam-container canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      border-radius: 14px;
    }

    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      color: var(--muted);
      font-size: .85rem;
      text-align: center;
    }

    .cam-placeholder svg {
      opacity: .35;
    }

    /* ── STATUS BADGE ── */
    .status-badge {
      margin-top: 1rem;
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 50px;
      padding: .3rem .9rem;
      transition: all .4s ease;
    }

    .status-badge.active {
      color: #86efac;
      border-color: rgba(134,239,172,.25);
      background: rgba(134,239,172,.06);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .4s, box-shadow .4s;
    }

    .status-badge.active .dot {
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse-dot 1.4s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; }
      50%      { opacity: .45; }
    }

    /* ── START BUTTON ── */
    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      margin-top: 1.5rem;
      padding: .8rem 2.2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .03em;
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--glow);
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s;
      position: relative;
      overflow: hidden;
    }

    .btn-start::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
      border-radius: inherit;
      opacity: 0;
      transition: opacity .2s;
    }

    .btn-start:hover::after { opacity: 1; }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--glow);
    }

    .btn-start:active { transform: translateY(0); }

    .btn-start:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-start svg {
      flex-shrink: 0;
    }

    /* ── PREDICTIONS PANEL ── */
    .predictions-panel {
      padding: 1.75rem 1.75rem 2rem;
    }

    .predictions-title {
      font-family: 'Syne', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    #label-container {
      display: flex;
      flex-direction: column;
      gap: .95rem;
    }

    .pred-item {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .pred-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pred-name {
      font-size: .88rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: .01em;
    }

    .pred-pct {
      font-family: 'Syne', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      color: var(--accent2);
      min-width: 42px;
      text-align: right;
      transition: color .3s;
    }

    .pred-pct.high { color: #a3e635; }

    .pred-bar-track {
      width: 100%;
      height: 8px;
      background: var(--bar-bg);
      border-radius: 50px;
      overflow: hidden;
    }

    .pred-bar-fill {
      height: 100%;
      border-radius: 50px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      transition: width .35s cubic-bezier(.4,0,.2,1), background .3s;
      box-shadow: 0 0 8px var(--glow);
    }

    .pred-bar-fill.high {
      background: linear-gradient(90deg, #4ade80 0%, #a3e635 100%);
      box-shadow: 0 0 10px rgba(163,230,53,.4);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      padding: 1rem 0 .5rem;
    }

    /* ── FOOTER ── */
    .site-footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .02em;
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 600px) {
      .webcam-panel {
        flex-direction: row;
        align-items: flex-start;
        gap: 2rem;
        padding: 2rem 2rem 1.75rem;
      }

      .webcam-panel > .webcam-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
      }

      .predictions-panel { padding: 1.75rem 2rem 2.25rem; }
    }

    @media (max-width: 599px) {
      #webcam-container { width: 220px; height: 220px; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <header class="site-header">
    <h1 class="site-title">
      Olha a Mão <em class="hand-emoji">🖐️</em>
    </h1>
    <p class="site-subtitle">Reconhecimento de gestos em tempo real com IA</p>
  </header>

  <!-- MAIN CARD -->
  <div class="main-card">

    <!-- WEBCAM + BUTTON -->
    <div class="webcam-panel">
      <div class="webcam-col">
        <div id="webcam-container">
          <div class="cam-placeholder" id="cam-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span>Câmera desligada</span>
          </div>
        </div>

        <div class="status-badge" id="status-badge">
          <span class="dot"></span>
          <span id="status-text">Aguardando</span>
        </div>

        <button class="btn-start" id="btn-start" onclick="init()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/>
          </svg>
          Permitir Câmera
        </button>
      </div>
    </div>

    <!-- PREDICTIONS -->
    <div class="predictions-panel">
      <p class="predictions-title">Correspondência por classe</p>
      <div id="label-container">
        <p class="empty-state">Inicie a câmera para ver as predições.</p>
      </div>
    </div>

  </div>

  <footer class="site-footer">
    Powered by <strong>Teachable Machine</strong> + TensorFlow.js
  </footer>
</div>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
  const URL = "https://teachablemachine.withgoogle.com/models/nJr3Qx1sEo/";
  let model, webcam, labelContainer, maxPredictions;

  async function init() {
    const btn = document.getElementById('btn-start');
    btn.disabled = true;
    btn.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
      </svg>
      Carregando…`;

    try {
      const modelURL    = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model          = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      const flip = true;
      webcam = new tmImage.Webcam(260, 260, flip);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      // Remove placeholder, add canvas
      const container = document.getElementById('webcam-container');
      document.getElementById('cam-placeholder').remove();
      container.appendChild(webcam.canvas);

      // Status → active
      const badge = document.getElementById('status-badge');
      badge.classList.add('active');
      document.getElementById('status-text').textContent = 'Câmera ativa';

      // Build prediction bars
      labelContainer = document.getElementById('label-container');
      labelContainer.innerHTML = '';

      for (let i = 0; i < maxPredictions; i++) {
        const item = document.createElement('div');
        item.className = 'pred-item';
        item.innerHTML = `
          <div class="pred-header">
            <span class="pred-name" id="name-${i}">Classe ${i + 1}</span>
            <span class="pred-pct" id="pct-${i}">0%</span>
          </div>
          <div class="pred-bar-track">
            <div class="pred-bar-fill" id="bar-${i}"></div>
          </div>`;
        labelContainer.appendChild(item);
      }

      btn.style.display = 'none';
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/>
      </svg> Permitir Câmera`;
      alert('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
      console.error(err);
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {
      const prob = prediction[i].probability;
      const pct  = Math.round(prob * 100);
      const high = pct >= 70;

      const nameEl = document.getElementById(`name-${i}`);
      const pctEl  = document.getElementById(`pct-${i}`);
      const barEl  = document.getElementById(`bar-${i}`);

      if (nameEl) nameEl.textContent = prediction[i].className;

      if (pctEl) {
        pctEl.textContent = pct + '%';
        pctEl.className   = 'pred-pct' + (high ? ' high' : '');
      }

      if (barEl) {
        barEl.style.width = pct + '%';
        barEl.className   = 'pred-bar-fill' + (high ? ' high' : '');
      }
    }
  }
</script>

</body>
</html>
